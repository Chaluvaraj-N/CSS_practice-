<!DOCTYPE html>
<html>
<head>
<title>Font Style</title>

<style>
body{
    font-family: Arial, sans-serif;
    padding: 30px;
}

h1{
    text-align: center;
}

.normal{
    font-style: normal;
}

.italic{
    font-style: italic;
}

.oblique{
    font-style: oblique;
}
</style>

</head>

<body>

<h1>Font Style</h1>

<p>By using the <b>font-style</b> property we can change the style of text in an HTML document.</p>

<h3>Syntax:</h3>
<p><b>font-style: value;</b></p>

<h3>Values:</h3>

<p class="normal">This text is normal style.</p>

<p class="italic">This text is italic style.</p>

<p class="oblique">This text is oblique style.</p>

</body>
</html>
