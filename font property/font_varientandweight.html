<!DOCTYPE html>
<html>
<head>
<title>Font Variant and Font Weight</title>

<style>

body{
    font-family: Arial, sans-serif;
}

/* Font Variant Example */
.normal-variant{
    font-variant: normal;
    color: blue;
}

.small-caps{
    font-variant: small-caps;
    color: green;
}

/* Font Weight Example */
.light{
    font-weight: 300;
    color: red;
}

.normal-weight{
    font-weight: normal;
    color: purple;
}

.bold{
    font-weight: bold;
    color: brown;
}

.bolder{
    font-weight: bolder;
    color: orange;
}

</style>

</head>

<body>

<h1>Font Variant and Font Weight Example</h1>

<h2>Font Variant</h2>

<p class="normal-variant">This text uses normal font variant.</p>

<p class="small-caps">This text uses small caps font variant.</p>


<h2>Font Weight</h2>

<p class="light">This text uses light font weight.</p>

<p class="normal-weight">This text uses normal font weight.</p>

<p class="bold">This text uses bold font weight.</p>

<p class="bolder">This text uses bolder font weight.</p>

</body>
</html>
