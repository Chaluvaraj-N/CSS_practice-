<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Document</title>
    <style>
        .spaced-text {
            letter-spacing: 25px;
            color: rgb(28, 144, 202);
            font-weight: lighter;
            font-family: Cambria, Cochin, Georgia, Times, 'Times New Roman', serif;

        }
    </style>
</head>
<body>
    <h2>Normal Letter Spacing</h2>
    <p>This is a normal paragraph.</p>
    
    <h2>Increased Letter Spacing</h2>
    <p class="spaced-text">This paragraph has increased letter spacing.</p>
</body>
</html>
