<!DOCTYPE html>
<html>
<head>
<title>Class and ID Selectors</title>

<style>

/* ID Selectors */
#header{
    color: white;
    background-color: black;
    text-align: center;
    padding: 10px;
}

#footer{
    color: white;
    background-color: gray;
    text-align: center;
    padding: 10px;
}

/* Class Selectors */
.text{
    color: blue;
    font-size: 18px;
}

.box{
    border: 2px solid black;
    padding: 10px;
    margin: 10px;
}

.highlight{
    background-color: yellow;
}

</style>
</head>

<body>

<h1 id="header">My Website</h1>

<p class="text">This is a paragraph using text class.</p>

<div class="box">
This is a box using class selector.
</div>

<p class="text highlight">This paragraph uses two classes.</p>

<div id="footer">
Footer Section
</div>

</body>
</html>
