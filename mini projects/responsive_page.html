<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Facebook Signup</title>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family: Arial, Helvetica, sans-serif;
}

body{
    background:#f0f2f5;
}

/* CENTER EVERYTHING */
.container{
    display:flex;
    justify-content:center;
    align-items:center;
    min-height:100vh;
    padding:20px;
}

/* BOX */
.signup-box{
    background:#fff;
    width:100%;
    max-width:400px;
    padding:25px 20px;
    border-radius:10px;
    box-shadow:0 3px 12px rgba(0,0,0,0.1);
}

/* TITLE */
.signup-box h1{
    color:#1877f2;
    text-align:center;
    margin-bottom:5px;
}

.signup-box p{
    text-align:center;
    color:#606770;
    margin-bottom:20px;
    font-size:14px;
}

/* FORM */
form{
    display:flex;
    flex-direction:column;
    gap:12px;
}

/* NAME ROW */
.name-row{
    display:flex;
    gap:10px;
}

.name-row input{
    width:100%;
}

/* INPUTS */
input, select{
    width:100%;
    padding:11px;
    border:1px solid #dddfe2;
    border-radius:6px;
    font-size:14px;
}

/* LABEL */
.label{
    font-size:13px;
    color:#606770;
    margin-bottom:3px;
}

/* DOB ROW */
.row{
    display:flex;
    gap:10px;
}

/* GENDER */
.gender{
    display:flex;
    gap:10px;
}

.gender label{
    flex:1;
    display:flex;
    align-items:center;
    justify-content:space-between;
    border:1px solid #dddfe2;
    padding:8px 10px;
    border-radius:6px;
    font-size:14px;
    cursor:pointer;
}

.gender input{
    margin-left:8px;
}

/* BUTTON */
button{
    background:#42b72a;
    color:#fff;
    padding:12px;
    border:none;
    border-radius:6px;
    font-size:16px;
    font-weight:bold;
    cursor:pointer;
    width:100%;
}

button:hover{
    background:#36a420;
}

/* LOGIN */
.login{
    text-align:center;
    margin-top:10px;
}

.login a{
    color:#1877f2;
    text-decoration:none;
    font-size:14px;
}

/* RESPONSIVE */

/* MOBILE */
@media (max-width:500px){
    .name-row{
        flex-direction:column;
    }

    .row{
        flex-direction:column;
    }

    .gender{
        flex-direction:column;
    }
}
</style>
</head>

<body>

<div class="container">
    <div class="signup-box">
        <h1>facebook</h1>
        <p>Create a new account</p>

        <form>

            <div class="name-row">
                <input type="text" placeholder="First name">
                <input type="text" placeholder="Surname">
            </div>

            <input type="email" placeholder="Mobile number or email">
            <input type="password" placeholder="New password">

            <div>
                <div class="label">Date of birth</div>
                <div class="row">
                    <select><option>Day</option></select>
                    <select><option>Month</option></select>
                    <select><option>Year</option></select>
                </div>
            </div>

            <div>
                <div class="label">Gender</div>
                <div class="gender">
                    <label>Male <input type="radio" name="g"></label>
                    <label>Female <input type="radio" name="g"></label>
                    <label>Custom <input type="radio" name="g"></label>
                </div>
            </div>

            <button>Sign Up</button>

            <div class="login">
                <a href="#">Already have an account?</a>
            </div>

        </form>
    </div>
</div>

</body>
</html>
