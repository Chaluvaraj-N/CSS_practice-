<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Grid Layout</title>

<style>
    * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
        font-family: Arial;
    }

    body {
        background: #f4f4f4;
        padding: 20px;
    }

    .container {
        display: grid;
        grid-template-columns: 200px 1fr;
        grid-template-rows: 80px   60px   200px  120px  80px;  
        grid-template-areas:
            "header header"
            "nav nav"
            "aside main"
            "aside article"   
            "footer footer";
        gap: 10px;
        height: 600px;
    }

    .header  { grid-area: header; background: #ff7675; }
    .nav     { grid-area: nav; background: #74b9ff; }
    .aside   { grid-area: aside; background: #55efc4; }
    .main    { grid-area: main; background: #ffeaa7; }
    .article { grid-area: article; background: #fab1a0; }
    .footer  { grid-area: footer; background: #636e72; color: white; }

    .container div {
        display: flex;
        justify-content: center;
        align-items: center;
        font-weight: bold;
        border-radius: 6px;
    }

</style>
</head>

<body>

<div class="container">
    <div class="header">Header</div>
    <div class="nav">Nav</div>
    <div class="aside">Aside</div>
    <div class="main">Main</div>
    <div class="article">Article</div>
    <div class="footer">Footer</div>
</div>

</body>
</html>
