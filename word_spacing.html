<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Document</title>
    <style>
        .spaced {
            word-spacing: 30px;
            color: seagreen;
        }
        .normal {
            word-spacing: normal;
            color: tomato;
        }
    </style>
</head>
<body>
    <p class="normal">This is a sentence with normal word spacing.</p>
    <p class="spaced">This is a sentence with increased word spacing.</p>
</body>
</html>
