<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        .item1{
            height: 100px;
            width: 200px;
            background-color: bisque;
            border: 5px solid black;
        }
          .item2{
            height: 100px;
            width: 200px;
            background-color: rgb(237, 134, 9);
            border: 5px solid black;
        }
          .item3{
            height: 100px;
            width: 200px;
            background-color: rgb(108, 235, 23);
            border: 5px solid black;
        }
        .container{
            height: 100vh;
            width: 100%;
            display: grid;
            grid-template-rows: 200px  300px; 
            grid-template-columns: 500px  400px 300px;
            gap: 40px;
            justify-items: center;
            align-items: center;
        }
    </style>
</head>
<body>
   <div class="container">
    <div class="item1"></div>
     <div class="item2"></div>
      <div class="item3"></div>
   </div> 
</body>
</html>
