<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            padding: 20px;
        }

        .container {
            border: 2px solid black;
            padding: 10px;
            margin: 20px;
        }

        .margin-top {
            background-color: lightblue;
            margin-top: 30px;
            border: 2px solid blue;
            padding: 10px;
        }

        .margin-right {
            background-color: lightcoral;
            margin-right: 50px;
            border: 2px solid red;
            padding: 10px;
        }

        .margin-bottom {
            background-color: lightgreen;
            margin-bottom: 40px;
            border: 2px solid green;
            padding: 10px;
        }

        .margin-left {
            background-color: lightyellow;
            margin-left: 60px;
            border: 2px solid orange;
            padding: 10px;
        }

        .margin-shorthand {
            background-color: lightgray;
            margin: 20px 40px 30px 50px;
            border: 2px solid purple;
            padding: 10px;
        }
    </style>
</head>
<body>
    <h1>CSS Margin Property</h1>

    <div class="container">
        <h2>1. margin-top</h2>
        <div class="margin-top">This element has margin-top: 30px</div>
    </div>

    <div class="container">
        <h2>2. margin-right</h2>
        <div class="margin-right">This element has margin-right: 50px</div>
    </div>

    <div class="container">
        <h2>3. margin-bottom</h2>
        <div class="margin-bottom">This element has margin-bottom: 40px</div>
    </div>

    <div class="container">
        <h2>4. margin-left</h2>
        <div class="margin-left">This element has margin-left: 60px</div>
    </div>

    <div class="container">
        <h2>margin (top, right, bottom, left)</h2>
        <div class="margin-shorthand">margin: 20px 40px 30px 50px</div>
    </div>
</body>
</html>
