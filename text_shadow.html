<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            padding: 20px;
            background-color: #f0f0f0;
        }

        h1 {
            text-shadow: 2px 2px 4px rgba(0, 0, 0, 0.5);
        }

        .shadow-1 {
            font-size: 24px;
            text-shadow: 3px 3px 0px #ff6b6b;
        }

        .shadow-2 {
            font-size: 24px;
            text-shadow: -2px -2px 5px #4ecdc4, 2px 2px 5px #ffe66d;
        }

        .shadow-3 {
            font-size: 24px;
            color: white;
            text-shadow: 0px 0px 10px #ff006e, 0px 0px 20px #00d4ff;
        }

        .shadow-4 {
            font-size: 24px;
            text-shadow: 1px 1px 2px #000, 0 0 25px #0099ff, 0 0 5px #003;
        }
    </style>
</head>
<body>
    <h1>Text Shadow</h1>

    <p class="shadow-1">Chaluva</p>
    <p class="shadow-2">kunigal</p>
    <p class="shadow-3">karanataka</p>
    <p class="shadow-4">bengaluru</p>
</body>
</html>
