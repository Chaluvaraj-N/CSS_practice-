<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        .box{
            height: 300px;
            width: 300px;
            background-color: blue;
            margin: 150px auto;
            transition: background-color 3s,transform 4s;
        }
        .box:hover{
            background-color: red;
             transform: translate(100px); 
                 transform: translateX(-300px); 
         transform: translateY(300px); 
             transform: rotate(360deg); 
           transform: rotate(120deg); 
             transform: rotateX(180deg); 
                 transform: rotateY(120deg); 
                 transform: scale(1.2); 
                 transform: scaleX(1.7); 
                    transform: scaleY(1.7); 
        }
           .box{
            height: 300px;
            width: 300px;
           background-image: url('https://i.pinimg.com/736x/0b/b5/8f/0bb58f42cfbdab04566096981286e85b.jpg');
            margin: 150px auto;
            background-position: center;
            background-size: cover;
          transition: background-image 4s,height 3s,width 5s,transform 6s;
          transition-timing-function: ease-in-out;
        }
        .box:hover{
  background-image: url('https://e1.pxfuel.com/desktop-wallpaper/402/943/desktop-wallpaper-d-boss-yajamana-by-quitereality-yajamana.jpg');
           height: 400px;
           width: 400px;
              transform: translate(100px);
                 transform: translateX(-300px); 
         transform: translateY(300px); 
            transform: rotate(360deg);
             transform: rotate(120deg); 
             transform: rotateX(180deg); 
               transform: rotateY(120deg); 
                transform: scale(1.2); 
                 transform: scaleX(1.7); 
                   transform: scaleY(1.7); 
               }

    </style>
</head>
<body>
    <div class="box"></div>
  <center>
    <button>Load more</button>
  </center>  
</body>
</html>
