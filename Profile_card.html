<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>ID Card</title>

<style>

body{
    margin:0;
    height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
    background:#e5e5e5;
    font-family:Arial, Helvetica, sans-serif;
}

.card{
    width:300px;
    background:white;
    border-radius:15px;
    box-shadow:0 10px 20px rgba(0,0,0,0.2);
    text-align:center;
    padding-bottom:20px;
}



.top-bar{
    background:#0b2b45;
    color:white;
    padding:15px;
    border-radius:15px 15px 0 0;
    font-weight:bold;
    letter-spacing:2px;
}



.profile img{
    width:120px;
    height:120px;
    object-fit:cover;
    margin-top:20px;
    border-radius:5px;
}



h1{
    font-size:24px;
    margin:10px 0 0;
    color:#0b2b45;
}

h3{
    font-size:14px;
    color:#555;
    letter-spacing:2px;
    margin-bottom:20px;
}



.info{
    text-align:left;
    padding:0 30px;
}

.info p{
    margin:8px 0;
    font-size:14px;
}



.bottom-bar{
    height:25px;
    background:#0b2b45;
    border-radius:0 0 15px 15px;
    margin-top:20px;
}

</style>
</head>

<body>

<div class="card">

    <div class="top-bar">
        DHEE CODING LABS
    </div>

    <div class="profile">
        <img src="cs.jpeg.jpeg" alt="profile" attr="profile" height="10px" width="10px">
    </div>

    <h1>CHALUVARAJ N</h1>
    <h3>PYTHON FULL STACK INTERN</h3>

    <div class="info">
        <p><b>ID No :</b>PFS013</p>
        <p><b>DOB :</b> 23/02/2004</p>
        <p><b>Email :</b> chaluvashetty23@gmail.com</p>
        <p><b>Phone :</b> 7899663405</p>
    </div>

    <div class="bottom-bar"></div>

</div>

</body>
</html>
