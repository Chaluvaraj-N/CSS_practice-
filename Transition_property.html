<html lang="en">
<head>

    <title>Document</title>
    <style>
         .box{
            height: 300px;
            width: 300px;
            background-color: blue;
            margin: 150px auto;
            transition: background-color 3s,border-radius 5s;
        }
        .box:hover{
            background-color: red;

        } 
           .box{
            height: 300px;
            width: 300px;
           background-image: url('https://tse2.mm.bing.net/th/id/OIP.LZ9UrcRnGV3pCumqBzGdFAHaJQ?pid=Api&P=0&h=180');
            margin: 150px auto;
            background-position: center;

          transition: background-image 4s,height 3s,width 5s;

        }
        .box:hover{
  background-image: url('https://www.filmibeat.com/img/2013/09/30-shankar-nag-07.jpg');

        button{
            height: 60px;
            width: 160px;
            border: none;
            background-color: blue;
            color: white;
            transition: width,border-radius,text-transform,border,box-shadow,background-image;
            transition-duration: 10s;

        }
        button:hover{
            width: 200px;
            border-radius: 10px;
            text-transform: uppercase;
            border: 5px solid black;
            box-shadow: 0px 0px 7px red;
            background-image: linear-gradient(orange,yellow);
        }
