<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Contact Section</title>

<style>
    body {
        font-family: Arial, sans-serif;
        background-color: #f2f2f2;
    }

    .container {
        width: 400px;
        margin: 50px auto;
        background: #fff;
        padding: 30px;
        border-radius: 8px;
        position: relative;
    }

    .item {
        position: relative;
        padding-left: 50px;
        margin-bottom: 30px;
    }

    .icon {
        position: absolute;
        left: 0;
        top: 5px;
        font-size: 22px;
        color: gray;
    }

    .title {
        font-weight: bold;
        font-size: 18px;
        color: #333;
    }

    .sub {
        color: gray;
        font-size: 14px;
        margin-top: 5px;
    }
</style>

</head>
<body>

<div class="container">

    <div class="item">
        <div class="icon">🏠</div>
        <div class="title">Buttonwood, California.</div>
        <div class="sub">Rosemead, CA 91770</div>
    </div>

    <div class="item">
        <div class="icon">📱</div>
        <div class="title">+1 253 565 2365</div>
        <div class="sub">Mon to Fri 9am to 6pm</div>
    </div>

    <div class="item">
        <div class="icon">✉️</div>
        <div class="title">support@colorlib.com</div>
        <div class="sub">Send us your query anytime!</div>
    </div>

</div>

</body>
</html>
