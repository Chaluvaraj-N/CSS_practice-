<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        .one{
            text-shadow: 0px 0px 10px blue;
        }
        .two{
            text-shadow: 7px 0px 5px red;
        }
        .three{
             text-shadow: -7px 0px 1px purple;
        }
        .four{
             text-shadow: 0px 10px 5px orange;
        }
        .five{
             text-shadow: 0px -10px 10px red;
        }
        div{
            height: 100px;
            width: 100px;
        }
        #one{
            box-shadow: 0px 0px 8px blue ;
            border-radius: 10px;
        } 
        #two{
            box-shadow: 10px 0px 5px red;
            border: 5px groove gold;
            border-radius: 10px;
        }
        #three{
             box-shadow: -10px 0px 5px black;
        
            border-radius: 50%;
        }
        #four{
             box-shadow: 0px 7px 5px lawngreen;
            border-radius: 10px;
        }
        #five{
                box-shadow: 0px -7px 5px fuchsia;
            border-radius: 10px;
        }
    </style>
</head>
<body>
    <h1>text shadow example</h1>
    <h3 class="one">Welcome</h3>
     <h3 class="two">Welcome</h3>
      <h3 class="three">Welcome</h3>
       <h3 class="four">Welcome</h3>
       <h3 class="five">Welcome</h3>
       <h1>Example for box shadow</h1>
       <div id="one"></div><br><br>
       <div id="two"></div><br><br>
       <div id="three"></div><br><br>
       <div id="four"></div><br><br>
       <div id="five"></div><br>
</body><br>
</html>
