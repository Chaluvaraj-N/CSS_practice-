<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: Arial, sans-serif;
            background-color: #049edb;
            padding: 20px;
        }

        .content-box {
            background-color: rgb(235, 64, 17);
            border: 1px solid #15cc2d;
            border-radius: 8px;
            padding: 30px;
            max-width: 600px;
            margin: 0 auto;
            box-shadow: 0 2px 8px rgba(241, 238, 238, 0);
        }

        .content-box h1 {
            color: #b4e30a;
            margin-bottom: 15px;
            font-size: 28px;
        }

        .content-box p {
            color: #0c27dc;
            line-height: 1.6;
            margin-bottom: 10px;
        }
    </style>
</head>
<body>
    <div class="content-box">
        <h1>Welcome</h1>
        <p>This is a content box.</p>
        <p>Add your content here.</p>
    </div>
</body>
</html>
