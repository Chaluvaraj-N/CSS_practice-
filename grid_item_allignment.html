<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Grid Item Alignment</title>

<style>
body {
    margin: 0;
    font-family: Arial;
}


.container {
    display: grid;
    grid-template-columns: repeat(2, 150px);
    grid-template-rows: repeat(2, 150px);
    gap: 10px;
    height: 100vh;

    justify-items: center;   
    align-items: center;     
}


.item {
    background: crimson;
    color: rgb(12, 147, 226);
    font-size: 24px;
    width: 100px;
    height:100px;
    display: flex;
    justify-content: center;
    align-items: center;
    background-image: url(https://i.pinimg.com/736x/9d/9f/e0/9d9fe08a397670cf7aa24facaddcceee.jpg);
}

.item1 {
    justify-self: start;
    align-self: start;
}

.item2 {
    justify-self: end;
    align-self: start;
}

.item3 {
    justify-self: start;
    align-self: end;
}

.item4 {
    justify-self: end;
    align-self: end;
}
</style>

</head>
<body>

<div class="container">
    <div class="item item1">1</div>
    <div class="item item2">2</div>
    <div class="item item3">3</div>
    <div class="item item4">4</div>
</div>

</body>
</html>
