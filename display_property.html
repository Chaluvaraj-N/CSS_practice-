<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        img{
            display: block;
        }
        i{
            display: block;
        }
        div{
            height: 100px;
            width: 100px;
            background-color: green;
            margin: 10px;
            color: white;
            display: inline-block;
        }
        h1,p{
            display: inline;
        }
        #img2{
            display: none;
        }
        .box2{
            display: none;
        }
        h1{
            display: none;
        }
    </style>
</head>
<body>
    <img src="dhee.jpg" height="200" width="200">
        <img src="dhee.jpg" height="200" width="200"
        id="img2">
        <b>Welcome</b><i>hello</i>
        <h1>welcome to css class</h1>
        <p>hello how are you</p>
        <div class="box1">one</div>
        <div class="box2">two</div>
</body>
</html>
