<!DOCTYPE html>
<html>
<head>
<title>Netflix</title>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial, Helvetica, sans-serif;
}

body{
color:white;
}

/* Background section */

.hero{
height:100vh;
background:
linear-gradient(rgba(0,0,0,0.75), rgba(0,0,0,0.75)),
url("https://i.pinimg.com/1200x/19/8b/2f/198b2f01e73b905772279616eccc7c65.jpg");
background-size:cover;
background-position:center;
position:relative;
}

/* Navbar */

nav{
display:flex;
justify-content:space-between;
align-items:center;
padding:25px 8%;
}

.logo{
width:160px;
}

.buttons button{
margin-left:10px;
padding:8px 18px;
border-radius:4px;
border:none;
font-weight:bold;
cursor:pointer;
}

.lang{
background:transparent;
color:white;
border:1px solid white;
}

.signin{
background:#e50914;
color:white;
}

/* Center Content */

.content{
position:absolute;
top:50%;
left:50%;
transform:translate(-50%,-50%);
text-align:center;
max-width:700px;
}

.content h1{
font-size:60px;
margin-bottom:20px;
}

.content h3{
font-size:26px;
font-weight:400;
margin-bottom:20px;
}

.content p{
font-size:18px;
margin-bottom:20px;
}

/* Email box */

.email-box{
display:flex;
justify-content:center;
}

.email-box input{
padding:15px;
width:400px;
border:none;
outline:none;
font-size:16px;
}

.email-box button{
padding:15px 30px;
background:#e50914;
color:white;
border:none;
font-size:18px;
cursor:pointer;
}

</style>
</head>

<body>

<div class="hero">

<nav>

<img src="https://upload.wikimedia.org/wikipedia/commons/0/08/Netflix_2015_logo.svg" class="logo">

<div class="buttons">
<button class="lang">English</button>
<button class="signin">Sign In</button>
</div>

</nav>

<div class="content">

<h1>Unlimited movies, shows, and more</h1>

<h3>Starts at ₹149. Cancel at any time.</h3>

<p>Ready to watch? Enter your email to create or restart your membership.</p>

<div class="email-box">
<input type="email" placeholder="Email address">
<button>Get Started ></button>
</div>

</div>

</div>

</body>
</html>
